name: Release VSIX

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Package
        run: |
          npm install --no-audit --no-fund
          npx vsce package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 🚀 ${{ github.ref_name }}

            下载 `.vsix` 文件，VS Code 中 `扩展 → ... → 从 VSIX 安装`
          files: |
            *.vsix
